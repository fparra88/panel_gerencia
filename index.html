<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Zeutica — Panel de Operaciones</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="src/tokens.css">
<link rel="stylesheet" href="src/components.css">
<link rel="stylesheet" href="src/charts.css">
<link rel="stylesheet" href="src/shell.css">
<link rel="stylesheet" href="src/login.css">
<link rel="stylesheet" href="src/cmdk.css">
<link rel="stylesheet" href="src/pages/ventas.css">

<style>
  /* App-level loader (before React mounts) */
  #app-loader {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-0);
    z-index: 9999;
  }
  #app-loader .spinner-lg { border-color: var(--bg-3); border-top-color: var(--brand); }
</style>
</head>
<body>

<div id="app-loader"><div class="spinner spinner-lg"></div></div>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Foundations -->
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/api.jsx"></script>
<script type="text/babel" src="src/toast.jsx"></script>
<script type="text/babel" src="src/charts.jsx"></script>

<!-- Shell & Login -->
<script type="text/babel" src="src/login.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>

<!-- Pages -->
<script type="text/babel" src="src/pages/dashboard.jsx"></script>
<script type="text/babel" src="src/pages/inventario.jsx"></script>
<script type="text/babel" src="src/pages/ventas.jsx"></script>
<script type="text/babel" src="src/pages/others.jsx"></script>

<!-- App bootstrap (LAST) -->
<script type="text/babel" src="src/app.jsx"></script>

<script>
  // Hide loader once React mounts
  const loaderHide = setInterval(() => {
    if (document.querySelector('#root').children.length > 0) {
      const l = document.getElementById('app-loader');
      if (l) { l.style.opacity = '0'; l.style.transition = 'opacity 200ms'; setTimeout(() => l.remove(), 200); }
      clearInterval(loaderHide);
    }
  }, 100);
  setTimeout(() => clearInterval(loaderHide), 10000);
</script>

</body>
</html>
