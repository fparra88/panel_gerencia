    background: var(--bg-0);

<script>
window.fireConfetti = function() {
  if (typeof confetti !== 'function') return;
  var opts = { startVelocity: 35, spread: 60, ticks: 90, zIndex: 9999 };
  confetti(Object.assign({}, opts, { particleCount: 120, angle: 60,  origin: { x: 0, y: 1 } }));
  confetti(Object.assign({}, opts, { particleCount: 120, angle: 120, origin: { x: 1, y: 1 } }));
};
</script>

<script>
  // Hide loader once React mounts
  const loaderHide = setInterval(() => {
    if (document.querySelector('#root').children.length > 0) {
      const l = document.getElementById('app-loader');
      if (l) { l.style.opacity = '0'; l.style.transition = 'opacity 200ms'; setTimeout(() => l.remove(), 200); }
      clearInterval(loaderHide);
    }
  }, 100);
  setTimeout(() => clearInterval(loaderHide), 10000);
</script>
